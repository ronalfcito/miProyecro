name: CI/CD Pipeline to GHCR

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # CAMBIA 'tu_usuario_github' por tu usuario real de GitHub en minúsculas
  IMAGE_NAME: ghcr.io/ronalfcito/flask-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:2.0.0
            ${{ env.IMAGE_NAME }}:latest

      - name: "mostrar datos de conexión (sin secretos sensibles)"
        run: |
          echo "probando la conexión con SSH con:"
          echo "Host: ${{ secrets.VPS_HOST }}"
          echo "usuario: ${{ secrets.VPS_USER }}"
          echo "puerto: ${{ secrets.VPS_SSH_PORT }}"
          echo "password: [OCULTO POR SEGURIDAD]"

      - name: "probar conexión SSH al VPS"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "probando la conexión con SSH EN EL VPS"
            touch quitoa.txt


      - name: "pasar archivos desde git al vps"
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "app/stack.yml,app/Makefile"
          target: "/home/${{ secrets.VPS_USER }}/landinga"


      - name: Despliegue de los servicios
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo " Desplegando servicios"
            cd /home/${{ secrets.VPS_USER }}/despliegue
            
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/ronaldfcito/flask-app:latest

            echo "==> Desplegando stack..."
            docker stack deploy -c stack.yml flask_stack
            

            
